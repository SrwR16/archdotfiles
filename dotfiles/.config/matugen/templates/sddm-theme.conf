[General]
passwordCharacter=*
passwordMask=true
passwordInputWidth=0.5
# Translucent surface box behind the password field (8-digit hex = alpha)
passwordInputBackground={{colors.surface.default.hex}}cc
passwordInputRadius=14
passwordInputCursorVisible=true
passwordFontSize=96
passwordCursorColor={{colors.primary.default.hex}}
passwordTextColor={{colors.on_surface.default.hex}}

showSessionsByDefault=false
sessionsFontSize=24
showUsersByDefault=false
usersFontSize=32

# World-readable copy of the live (blurred) wallpaper, synced by apply_target.sh
background=/var/lib/sddm/dotfiles/blurred_wallpaper.png
backgroundFill={{colors.surface.default.hex}}
backgroundFillMode=aspect

basicTextColor={{colors.on_surface.default.hex}}
