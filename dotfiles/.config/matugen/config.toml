[config]

[templates.colorsjson]
input_path = '~/.config/matugen/templates/colors.json'
output_path = '~/.config/dotfiles/colors/colors.json'

# Live Quickshell "island" palette. Running matugen directly (not just via the
# wallpaper pipeline) now regenerates theme/colors.json, which shell.qml watches
# and pushes into the Theme singleton — so the island updates on every matugen run.
[templates.quickshell_theme]
input_path = '~/.config/matugen/templates/quickshell-colors.json'
output_path = '~/.config/quickshell/theme/colors.json'
# Mirror hyprland's `hyprctl reload` post_hook: matugen writes the file, then we
# explicitly tell the running quickshell to re-read it. Relying on FileView's
# watchChanges alone misses matugen's atomic rewrite, so colors only refreshed on
# reboot (fresh process) before this was added.
post_hook = 'qs ipc call theme-manager reload || true'

[templates.quickshell_colors]
input_path = '~/.config/matugen/templates/colors.json'
output_path = '~/.config/hypr/scripts/quickshell/qs_colors.json'

[templates.kitty]
input_path = '~/.config/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors-matugen.conf'
post_hook = 'pkill -SIGUSR1 kitty'

[templates.btop]
input_path = '~/.config/matugen/templates/btop.theme'
output_path = '~/.config/btop/themes/matugen.theme'

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload'

[templates.hyprland-lua]
input_path = '~/.config/matugen/templates/hyprland-colors.lua'
output_path = '~/.config/hypr/colors.lua'
post_hook = 'hyprctl reload'

[templates.rofi]
input_path = '~/.config/matugen/templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'
post_hook = '~/.config/matugen/post-hook-scripts/gtk-themes-reload.sh'

[templates.pywalfox]
input_path = '~/.config/matugen/templates/pywalfox-colors.json'
output_path = '~/.cache/wal/colors.json'

[templates.sequences]
input_path = '~/.config/matugen/templates/sequences'
output_path = '~/.cache/wal/sequences'

# Output into a world-readable dir (/var/lib/sddm/dotfiles) created by
# apps/sddm/install.sh and owned by the user. The SDDM greeter runs as the
# 'sddm' user and CANNOT read ~/.cache (mode 700), which caused the blank
# white screen — keeping these files here fixes it.
[templates.sddm]
input_path = '~/.config/matugen/templates/sddm-theme.conf'
output_path = '/var/tmp/sddm-dotfiles/theme.conf'

[templates.primary]
input_path = '~/.config/matugen/templates/primary'
output_path = '~/.config/dotfiles/colors/primary'

[templates.secondary]
input_path = '~/.config/matugen/templates/secondary'
output_path = '~/.config/dotfiles/colors/secondary'

[templates.on_surface]
input_path = '~/.config/matugen/templates/onsurface'
output_path = '~/.config/dotfiles/colors/onsurface'

[templates.on_primary]
input_path = '~/.config/matugen/templates/onprimary'
output_path = '~/.config/dotfiles/colors/onprimary'

[templates.dotfiles_dotfiles_settings]
input_path  = "./templates/colors.json"
output_path = "~/.local/share/dotfiles-settings/colors/colors.json"

[templates.quickshell_overview]
input_path  = "./templates/quickshell-overview.qml"
output_path = "~/.config/quickshell/overview/common/Appearance.colors.qml"

[templates.ohmyposh]
input_path = '~/.config/matugen/templates/ohmyposh-colors.json'
output_path = '~/.config/ohmyposh/colors.json'
post_hook = "jq --slurpfile palette ~/.config/ohmyposh/colors.json '. + $palette[0]' ~/.config/ohmyposh/EDM115-newline.omp.json > /tmp/new_theme.json && mv /tmp/new_theme.json ~/.config/ohmyposh/EDM115-newline.omp.json"

