# Cache Folder
$dotfiles_cache_folder = $HOME/.cache/dotfiles/hyprland-dotfiles

# Source colors
source = colors.conf

general {
    ignore_empty_input = true
    grace = 2                 # instantly dismiss a fresh lock within N seconds (no flicker on suspend)
    hide_cursor = false
    immediate_render = true
    fractional_scaling = 2
}

background {
    monitor =
    path = $dotfiles_cache_folder/blurred_wallpaper.png
    color = rgba(0, 0, 0, 1.0)     # shown until the wallpaper is available
    blur_size = 8
    blur_passes = 3
    noise = 0.02
    contrast = 1.1
    brightness = 0.7
    vibrancy = 0.30
    vibrancy_darkness = 0.0
}

# Subtle dark card behind the password field for contrast
shape {
    monitor =
    size = 380, 84
    color = rgba(0, 0, 0, 0.35)
    rounding = 28
    position = 0, 110
    halign = center
    valign = center
    zindex = -1
}

# Clock
label {
    monitor =
    text = cmd[update:1000] date '+%H:%M'
    color = $on_surface
    font_size = 92
    font_family = Fira Sans Semibold
    position = 0, -130
    halign = center
    valign = center
    shadow_passes = 10
    shadow_size = 20
    shadow_color = $shadow
    shadow_boost = 1.6
}

# Date
label {
    monitor =
    text = cmd[update:1000] date '+%A, %d %B'
    color = $on_surface
    font_size = 22
    font_family = Fira Sans
    position = 0, -55
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
    shadow_color = $shadow
}

# User
label {
    monitor =
    text = $USER
    color = $primary
    font_size = 22
    font_family = Fira Sans Semibold
    position = 0, 25
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
    shadow_color = $shadow
}

# Password
input-field {
    monitor =
    size = 300, 56
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    inner_color = $primary
    font_color = $on_primary
    outer_color = $on_primary
    rounding = 28            # pill shape
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    check_color = $primary
    fail_color = $error
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, 110
    halign = center
    valign = center
    shadow_passes = 10
    shadow_size = 20
    shadow_color = $shadow
    shadow_boost = 1.6
}
